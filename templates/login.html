<!DOCTYPE html>
<html>
<head>
    <title>TOP EZ License Server - Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { background: #16213e; padding: 40px; border-radius: 12px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .login-box h1 { text-align: center; margin-bottom: 8px; color: #00d4aa; font-size: 20px; }
        .login-box p { text-align: center; margin-bottom: 24px; color: #888; font-size: 13px; }
        input[type="password"] { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 6px; background: #0f3460; color: #eee; font-size: 14px; margin-bottom: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background: #00d4aa; color: #1a1a2e; font-size: 14px; font-weight: bold; cursor: pointer; }
        button:hover { background: #00b894; }
        .error { color: #e74c3c; text-align: center; margin-bottom: 12px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>TOP EZ License Server</h1>
        <p>Admin Panel</p>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST" action="/admin/login">
            <input type="password" name="password" placeholder="Admin Password" autofocus>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
